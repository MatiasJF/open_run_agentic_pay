<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Base blue sphere gradient -->
    <radialGradient id="base" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#5a8aff"/>
      <stop offset="40%" stop-color="#2E2EFF"/>
      <stop offset="75%" stop-color="#1A1A99"/>
      <stop offset="100%" stop-color="#0e0e5c"/>
    </radialGradient>
    <!-- Glossy top highlight -->
    <radialGradient id="gloss" cx="40%" cy="28%" r="35%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Bottom rim light -->
    <radialGradient id="rim" cx="55%" cy="85%" r="40%">
      <stop offset="0%" stop-color="rgba(0,212,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(0,212,255,0)"/>
    </radialGradient>
    <!-- Clip to sphere -->
    <clipPath id="sphere">
      <circle cx="16" cy="16" r="14.5"/>
    </clipPath>
  </defs>

  <!-- Shadow -->
  <ellipse cx="16" cy="30" rx="10" ry="1.5" fill="rgba(0,0,0,0.15)"/>

  <!-- Base sphere -->
  <circle cx="16" cy="16" r="14.5" fill="url(#base)"/>

  <!-- Marble veins clipped to sphere -->
  <g clip-path="url(#sphere)">
    <!-- Primary vein — sweeps across diagonally -->
    <path d="M4,10 Q10,14 16,13 Q22,12 28,18" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M5,12 Q12,16 18,14.5 Q24,13 29,20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8" stroke-linecap="round"/>

    <!-- Secondary vein — curves the other way -->
    <path d="M6,22 Q12,18 18,20 Q24,22 30,16" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M5,24 Q11,19 17,21.5 Q23,24 31,17" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.7" stroke-linecap="round"/>

    <!-- Thin accent veins -->
    <path d="M2,16 Q8,12 14,16 Q20,20 28,14" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.5" stroke-linecap="round"/>
    <path d="M8,6 Q13,10 16,18 Q19,26 26,28" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.6" stroke-linecap="round"/>
    <path d="M3,8 Q9,13 12,20 Q15,27 20,30" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.4" stroke-linecap="round"/>

    <!-- Faint cyan tint vein -->
    <path d="M10,4 Q14,8 20,10 Q26,12 30,8" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="0.6" stroke-linecap="round"/>
    <path d="M2,20 Q8,24 16,24 Q24,24 28,26" fill="none" stroke="rgba(0,212,255,0.06)" stroke-width="0.5" stroke-linecap="round"/>
  </g>

  <!-- Glossy highlight -->
  <circle cx="16" cy="16" r="14.5" fill="url(#gloss)"/>

  <!-- Rim light -->
  <circle cx="16" cy="16" r="14.5" fill="url(#rim)"/>

  <!-- Sharp specular highlight -->
  <ellipse cx="11.5" cy="9.5" rx="3.5" ry="2" fill="rgba(255,255,255,0.35)" transform="rotate(-20 11.5 9.5)"/>
  <ellipse cx="11" cy="9" rx="1.8" ry="0.9" fill="rgba(255,255,255,0.25)" transform="rotate(-20 11 9)"/>
</svg>
